# Deploy with:
#   docker compose --env-file .env.production up -d --build
#
# --env-file supplies build args (NEXT_PUBLIC_*) for compose variable
# substitution; env_file below supplies the container's runtime env
# (including the SUPABASE_SERVICE_ROLE_KEY secret).

services:
  web:
    build:
      context: .
      # These resolve from the --env-file (see comment above). The :? guards
      # fail fast with a clear message instead of passing blank strings (which
      # would otherwise blow up deep inside `next build` env validation).
      args:
        NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL:?missing env — deploy with --env-file .env.production}"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY:?missing env — deploy with --env-file .env.production}"
        NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:?missing env — deploy with --env-file .env.production}"
    image: exercise-app:latest
    env_file:
      - .env.production
    # Bind to localhost only — the existing nginx is the sole public entry point.
    ports:
      - "127.0.0.1:3001:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
