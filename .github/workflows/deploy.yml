name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm test

  build-push:
    needs: verify
    runs-on: ubuntu-latest
    # The NEXT_PUBLIC_* build values live as secrets under the "Live"
    # environment, so this job must opt into it to read them.
    environment: Live
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        run: echo "tag=sha-$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.vars.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    # EC2_* deploy secrets also live under the "Live" environment.
    environment: Live
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,GHCR_USER,GHCR_TOKEN,APP_DIR
          script: |
            set -euo pipefail
            cd "${APP_DIR:-$HOME/fitness-app}"

            # Retry network steps so a transient registry/DNS blip (e.g. the
            # "ghcr.io/v2/: EOF" handshake error) doesn't fail the whole deploy.
            retry() {
              local n=1 max=3 delay=5
              until "$@"; do
                if [ "$n" -ge "$max" ]; then
                  echo "FAILED after $n attempts: $*" >&2
                  return 1
                fi
                echo "attempt $n failed; retrying in ${delay}s..." >&2
                sleep "$delay"; n=$((n + 1)); delay=$((delay * 2))
              done
            }
            ghcr_login() { echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin; }

            git pull --ff-only
            export IMAGE_TAG
            retry ghcr_login
            retry docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
        env:
          IMAGE_TAG: ${{ needs.build-push.outputs.tag }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_DIR: ${{ vars.EC2_APP_DIR }}
