<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger — Today (Dashboard)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root, [data-theme="light"] {
    --bg:0.962 0.008 85; --surface:0.984 0.007 85; --elevated:0.998 0.004 85;
    --text-primary:0.245 0.006 75; --text-secondary:0.455 0.007 75; --text-muted:0.615 0.007 75;
    --border:0.885 0.009 80; --border-strong:0.80 0.011 80;
    --accent-volt:0.815 0.190 122; --accent-ember:0.700 0.150 65;
    --on-volt:0.255 0.040 122; --on-ember:0.985 0.010 85;
    --success:0.605 0.140 150;
    --sh-soft:0 2px 10px oklch(0.245 0.04 75 / 0.07), 0 1px 2px oklch(0.245 0.04 75 / 0.05);
    --sh-cta:0 6px 22px oklch(0.245 0.04 75 / 0.10);
  }
  [data-theme="dark"] {
    --bg:0.178 0.005 80; --surface:0.216 0.006 80; --elevated:0.258 0.007 80;
    --text-primary:0.952 0.004 85; --text-secondary:0.722 0.006 82; --text-muted:0.560 0.007 82;
    --border:0.305 0.007 82; --border-strong:0.40 0.009 82;
    --accent-volt:0.855 0.200 122; --accent-ember:0.760 0.150 70;
    --on-volt:0.205 0.040 122; --on-ember:0.180 0.030 70;
    --success:0.745 0.150 150;
    --sh-soft:0 2px 12px oklch(0 0 0 / 0.45), 0 1px 2px oklch(0 0 0 / 0.40);
    --sh-cta:0 6px 22px oklch(0 0 0 / 0.5);
  }
  [data-accent="volt"]  { --accent:var(--accent-volt);  --on-accent:var(--on-volt); }
  [data-accent="ember"] { --accent:var(--accent-ember); --on-accent:var(--on-ember); }
  *{-webkit-font-smoothing:antialiased; box-sizing:border-box;}
  body{ background:oklch(0.93 0.006 80); font-family:'Inter',system-ui,sans-serif; font-variant-numeric:tabular-nums slashed-zero; }
  .c{ color:oklch(var(--text-primary)); }
  .metric{ font-variant-numeric:tabular-nums slashed-zero; letter-spacing:-0.04em; font-weight:600; line-height:0.92; }
  .scroll::-webkit-scrollbar{ width:0; }
  @keyframes pulse{ 0%,100%{opacity:1; transform:scale(1)} 50%{opacity:0.35; transform:scale(0.8)} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const T = (k)=>`oklch(var(--${k}))`;
const svg=(d,s=20,sw=1.85)=>(p)=><svg width={p.s||s} height={p.s||s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p.sw||sw} strokeLinecap="round" strokeLinejoin="round" style={p.style}>{d}</svg>;
const I={
  home:svg(<path d="m3 9.5 9-7 9 7V20a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/>),
  layers:svg(<g><path d="m12 2.5 9 5-9 5-9-5z"/><path d="m3 12 9 5 9-5"/></g>),
  clock:svg(<g><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 2"/></g>),
  sliders:svg(<g><path d="M20 7h-7M9 7H4M20 17h-4M12 17H4"/><circle cx="11" cy="7" r="2.2"/><circle cx="14" cy="17" r="2.2"/></g>),
  plus:svg(<path d="M12 5v14M5 12h14"/>),
  flame:svg(<path d="M12 3c.6 2.2 2.7 3.2 2.7 6.2A2.7 2.7 0 0 1 9.3 9.4c0-.9.4-1.5.4-1.5.6 1.4 2.1.9 2.1-1.1 0-1.6-1-2.6 0-3.8z"/>),
  chev:svg(<path d="m9 18 6-6-6-6"/>),
  arrow:svg(<path d="M5 12h14M13 6l6 6-6 6"/>),
  award:svg(<g><circle cx="12" cy="9" r="5.5"/><path d="M8.6 13.8 7.2 21l4.8-2.6L16.8 21l-1.4-7.2"/></g>),
};

function StatusBar(){
  return (
    <div className="relative h-[50px] shrink-0 flex items-end justify-between px-7 pb-1.5">
      <span className="text-[15px] font-semibold c">9:41</span>
      <div className="absolute left-1/2 -translate-x-1/2 top-[11px] w-[112px] h-[30px] rounded-full" style={{background:'#000'}}/>
      <div className="flex items-center gap-1.5 c">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity="0.35"/></svg>
        <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="1" y="1" width="20" height="10" rx="3" stroke="currentColor" strokeOpacity="0.5"/><rect x="2.5" y="2.5" width="15" height="7" rx="1.5" fill="currentColor"/><rect x="22" y="4" width="1.5" height="4" rx="0.75" fill="currentColor" fillOpacity="0.5"/></svg>
      </div>
    </div>
  );
}

function WeekStat({val, unit, label}){
  return (
    <div className="flex-1 text-center">
      <div className="flex items-baseline justify-center gap-1">
        <span className="metric text-[26px] c">{val}</span>
        {unit && <span className="metric text-[13px]" style={{color:T('text-muted')}}>{unit}</span>}
      </div>
      <div className="text-[11px] font-medium mt-1" style={{color:T('text-muted')}}>{label}</div>
    </div>
  );
}

function ContinueCard(){
  return (
    <div className="rounded-[16px] p-4" style={{background:T('elevated'), border:`1px solid ${T('border')}`, boxShadow:'var(--sh-soft)'}}>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <span className="w-2 h-2 rounded-full" style={{background:T('accent'), animation:'pulse 1.6s ease-in-out infinite'}}/>
          <span className="text-[11px] font-bold tracking-[0.1em] uppercase" style={{color:T('text-muted')}}>In progress</span>
        </div>
        <span className="text-[11px] font-medium" style={{color:T('text-muted')}}>Started 9:17</span>
      </div>
      <div className="flex items-end justify-between">
        <div>
          <div className="text-[17px] font-bold c" style={{letterSpacing:'-0.01em'}}>Push Day A</div>
          <div className="text-[12.5px] mt-0.5" style={{color:T('text-secondary')}}>3 of 5 exercises · 9 sets logged</div>
        </div>
        <div className="metric text-[34px] c">24:18</div>
      </div>
      {/* progress track */}
      <div className="flex gap-1 mt-3.5 mb-3.5">
        {[1,1,1,0,0].map((f,i)=><div key={i} className="flex-1 h-[3px] rounded-full" style={{background: f?T('text-primary'):T('border')}}/>)}
      </div>
      <button className="w-full h-[44px] rounded-[11px] flex items-center justify-center gap-1.5 text-[14px] font-semibold"
        style={{background:'transparent', color:T('accent'), border:`1.5px solid ${T('accent')}`}}>
        Resume <I.arrow s={16}/>
      </button>
    </div>
  );
}

function SessionRow({name, stats, dur, date, pb}){
  return (
    <div className="flex items-center gap-3 px-4 py-3.5">
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-1.5">
          <span className="text-[14px] font-semibold c truncate">{name}</span>
          {pb && <span style={{color:T('accent')}}><I.award s={14}/></span>}
        </div>
        <div className="text-[12px] mt-0.5" style={{color:T('text-muted')}}>{stats}</div>
      </div>
      <div className="text-right shrink-0">
        <div className="metric text-[14px] c flex items-center gap-1 justify-end"><I.clock s={12}/>{dur}</div>
        <div className="text-[11px] mt-0.5" style={{color:T('text-muted')}}>{date}</div>
      </div>
    </div>
  );
}

function TabBar(){
  const tabs=[['Home',I.home,1],['Library',I.layers,0],['Start',null,0],['History',I.clock,0],['Settings',I.sliders,0]];
  return (
    <div className="flex items-stretch px-2 pt-2 pb-7 shrink-0" style={{background:T('elevated'), borderTop:`1px solid ${T('border')}`}}>
      {tabs.map(([l,Ic,on])=> !Ic ? (
        <div key={l} className="flex-1 flex justify-center">
          <button className="w-[52px] h-[52px] -mt-4 rounded-full flex items-center justify-center" style={{background:T('accent'), color:T('on-accent'), boxShadow:'var(--sh-cta)'}}><I.plus s={24}/></button>
        </div>
      ):(
        <button key={l} className="flex-1 flex flex-col items-center gap-1 py-0.5" style={{color: on?T('accent'):T('text-muted')}}>
          <Ic s={23}/><span className="text-[10px] font-semibold">{l}</span>
        </button>
      ))}
    </div>
  );
}

function Screen(){
  return (
    <div className="h-full flex flex-col">
      <StatusBar/>
      {/* scroll body */}
      <div className="scroll flex-1 overflow-y-auto px-5 pt-2 pb-4">
        {/* header */}
        <div className="flex items-center justify-between mb-6">
          <div>
            <div className="text-[13px] font-medium" style={{color:T('text-muted')}}>Friday · May 30</div>
            <h1 className="text-[27px] font-bold c" style={{letterSpacing:'-0.03em'}}>Good morning</h1>
          </div>
          <div className="flex items-center gap-2.5">
            <div className="flex items-center gap-1 px-2.5 h-[34px] rounded-full" style={{background:`color-mix(in oklab, ${T('success')} 14%, ${T('surface')})`, color:T('success')}}>
              <I.flame s={15}/><span className="metric text-[14px]">12</span>
            </div>
            <div className="w-[38px] h-[38px] rounded-full flex items-center justify-center text-[13px] font-bold" style={{background:T('surface'), color:T('text-secondary'), border:`1px solid ${T('border')}`}}>AK</div>
          </div>
        </div>

        {/* weekly summary — understated */}
        <div className="rounded-[14px] px-2 py-3.5 mb-5 flex items-stretch" style={{background:T('surface'), border:`1px solid ${T('border')}`}}>
          <WeekStat val="3" label="Workouts"/>
          <div style={{width:1, background:T('border')}}/>
          <WeekStat val="48.3" unit="k lb" label="Volume"/>
          <div style={{width:1, background:T('border')}}/>
          <WeekStat val="3:21" label="Time"/>
        </div>

        {/* continue (focal content) */}
        <ContinueCard/>

        {/* recent */}
        <div className="flex items-center justify-between mt-7 mb-2.5 px-1">
          <span className="text-[12px] font-bold tracking-[0.08em] uppercase" style={{color:T('text-muted')}}>Recent</span>
          <button className="text-[12.5px] font-semibold flex items-center gap-0.5" style={{color:T('text-secondary')}}>All <I.chev s={14}/></button>
        </div>
        <div className="rounded-[14px] overflow-hidden" style={{background:T('surface'), border:`1px solid ${T('border')}`}}>
          <SessionRow name="Pull Day B" stats="5 exercises · 18 sets" dur="1:02" date="Wed" pb/>
          <div style={{height:1, background:T('border')}}/>
          <SessionRow name="Leg Day" stats="4 exercises · 15 sets" dur="0:54" date="Mon"/>
          <div style={{height:1, background:T('border')}}/>
          <SessionRow name="Push Day A" stats="5 exercises · 20 sets" dur="1:08" date="May 24"/>
        </div>
      </div>

      {/* bottom anchored primary — the single focal action */}
      <div className="px-5 pb-3 pt-2 shrink-0" style={{background:`linear-gradient(to top, ${T('bg')} 70%, transparent)`}}>
        <button className="w-full h-[54px] rounded-[15px] text-[16px] font-semibold flex items-center justify-center gap-2"
          style={{background:T('accent'), color:T('on-accent'), boxShadow:'var(--sh-cta)'}}>
          <I.plus s={20}/> Start Session
        </button>
      </div>
      <TabBar/>
    </div>
  );
}

function Phone({mode, accent}){
  return (
    <div data-theme={mode} data-accent={accent}>
      <div className="text-[10px] font-semibold tracking-[0.16em] uppercase mb-3 text-center" style={{color:'oklch(0.5 0.007 75)'}}>{mode}</div>
      <div className="rounded-[46px] p-[5px]" style={{background: mode==='dark'?'#2a2a28':'#dcd7ce', boxShadow:'0 30px 60px oklch(0.245 0.04 75 / 0.18)'}}>
        <div className="rounded-[41px] overflow-hidden" style={{width:390, height:844, background:T('bg')}}>
          <Screen/>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [accent,setAccent] = useState('volt');
  return (
    <div className="min-h-screen">
      <header className="max-w-[940px] mx-auto px-6 pt-8 pb-6 flex items-center justify-between">
        <div className="flex items-baseline gap-2.5">
          <span className="metric text-[19px]" style={{color:'oklch(0.245 0.006 75)'}}>L</span>
          <span className="text-[14px] font-bold tracking-[0.18em]" style={{color:'oklch(0.245 0.006 75)'}}>LEDGER</span>
          <span className="text-[12px] ml-1" style={{color:'oklch(0.5 0.007 75)'}}>Today · Dashboard</span>
        </div>
        <div className="inline-flex rounded-[6px] p-[3px]" style={{background:'oklch(0.98 0.006 80)', border:'1px solid oklch(0.86 0.009 80)'}}>
          {[['Volt','volt'],['Ember','ember']].map(([l,v])=>(
            <button key={v} onClick={()=>setAccent(v)} className="px-3 py-1.5 rounded-[4px] text-[12px] font-semibold"
              style={accent===v?{background:'oklch(0.245 0.006 75)', color:'oklch(0.96 0.008 85)'}:{color:'oklch(0.45 0.007 75)'}}>{l}</button>
          ))}
        </div>
      </header>
      <div className="flex flex-wrap gap-10 justify-center pb-20 px-6">
        <Phone mode="light" accent={accent}/>
        <Phone mode="dark" accent={accent}/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
