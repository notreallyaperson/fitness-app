<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger — Live Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root, [data-theme="light"] {
    --bg:0.962 0.008 85; --surface:0.984 0.007 85; --elevated:0.998 0.004 85; --inset:0.945 0.008 82;
    --text-primary:0.245 0.006 75; --text-secondary:0.455 0.007 75; --text-muted:0.615 0.007 75; --text-faint:0.74 0.007 80;
    --border:0.885 0.009 80; --border-strong:0.80 0.011 80;
    --accent-volt:0.815 0.190 122; --accent-ember:0.700 0.150 65;
    --on-volt:0.255 0.040 122; --on-ember:0.985 0.010 85;
    --success:0.605 0.140 150; --warning:0.760 0.150 70; --destructive:0.575 0.185 28; --on-destructive:0.985 0.01 28;
    --sh-soft:0 2px 10px oklch(0.245 0.04 75 / 0.07), 0 1px 2px oklch(0.245 0.04 75 / 0.05);
    --sh-cta:0 6px 22px oklch(0.245 0.04 75 / 0.10);
  }
  [data-theme="dark"] {
    --bg:0.178 0.005 80; --surface:0.216 0.006 80; --elevated:0.258 0.007 80; --inset:0.150 0.005 80;
    --text-primary:0.952 0.004 85; --text-secondary:0.722 0.006 82; --text-muted:0.560 0.007 82; --text-faint:0.44 0.008 82;
    --border:0.305 0.007 82; --border-strong:0.40 0.009 82;
    --accent-volt:0.855 0.200 122; --accent-ember:0.760 0.150 70;
    --on-volt:0.205 0.040 122; --on-ember:0.180 0.030 70;
    --success:0.745 0.150 150; --warning:0.820 0.140 75; --destructive:0.660 0.185 28; --on-destructive:0.150 0.02 28;
    --sh-soft:0 2px 12px oklch(0 0 0 / 0.45), 0 1px 2px oklch(0 0 0 / 0.40);
    --sh-cta:0 6px 22px oklch(0 0 0 / 0.5);
  }
  [data-accent="volt"]  { --accent:var(--accent-volt);  --on-accent:var(--on-volt); }
  [data-accent="ember"] { --accent:var(--accent-ember); --on-accent:var(--on-ember); }
  *{-webkit-font-smoothing:antialiased; box-sizing:border-box;}
  body{ background:oklch(0.93 0.006 80); font-family:'Inter',system-ui,sans-serif; font-variant-numeric:tabular-nums slashed-zero; }
  .c{ color:oklch(var(--text-primary)); }
  .metric{ font-variant-numeric:tabular-nums slashed-zero; letter-spacing:-0.04em; font-weight:600; line-height:0.92; }
  .mono{ font-family:'JetBrains Mono',ui-monospace,monospace; font-variant-numeric:tabular-nums; }
  .scroll::-webkit-scrollbar{ width:0; }
  input{ font-family:inherit; outline:none; background:transparent; }
  @keyframes pulse{ 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.35;transform:scale(0.78)} }
  @keyframes stamp{ 0%{transform:scale(1.08);opacity:0} 60%{transform:scale(1)} 100%{transform:scale(1);opacity:1} }
  @keyframes donepulse{ 0%{transform:scale(0.9);opacity:0.5} 50%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }
  @keyframes sheetin{ from{transform:translateY(100%)} to{transform:translateY(0)} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const T = (k)=>`oklch(var(--${k}))`;
const mix = (k,p,base='surface')=>`color-mix(in oklab, ${T(k)} ${p}%, ${T(base)})`;
const svg=(d,s=20,sw=1.85)=>(p)=><svg width={p.s||s} height={p.s||s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={p.sw||sw} strokeLinecap="round" strokeLinejoin="round" style={p.style}>{d}</svg>;
const I={
  grip:(p)=><svg width={p.s||18} height={p.s||18} viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="15" cy="18" r="1.4"/></svg>,
  dots:(p)=><svg width={p.s||20} height={p.s||20} viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>,
  x:svg(<path d="M18 6 6 18M6 6l12 12"/>),
  plus:svg(<path d="M12 5v14M5 12h14"/>),
  minus:svg(<path d="M5 12h14"/>),
  pencil:svg(<g><path d="M12 20h9"/><path d="M16.5 3.5a2.05 2.05 0 0 1 2.9 2.9L7 19l-4 1 1-4z"/></g>),
  cal:svg(<g><rect x="3" y="4.5" width="18" height="16" rx="3"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4"/></g>),
  weight:svg(<g><path d="M6 8.5h12l1.5 11H4.5z"/><path d="M9 8.5a3 3 0 0 1 6 0"/></g>),
  clock:svg(<g><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 2"/></g>),
  skip:svg(<g><path d="M5 5v14l9-7z"/><path d="M19 5v14"/></g>),
  pause:svg(<path d="M8 5v14M16 5v14"/>),
  play:(p)=><svg width={p.s||20} height={p.s||20} viewBox="0 0 24 24" fill="currentColor"><path d="M7 4.5v15l13-7.5z"/></svg>,
  check:svg(<path d="M20 6 9 17l-5-5"/>),
  award:svg(<g><circle cx="12" cy="9" r="5.5"/><path d="M8.6 13.8 7.2 21l4.8-2.6L16.8 21l-1.4-7.2"/></g>),
  search:svg(<g><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></g>),
  chev:svg(<path d="m9 18 6-6-6-6"/>),
  chevD:svg(<path d="m6 9 6 6 6-6"/>),
};
const pad=(n)=>String(n).padStart(2,'0');
const fmtH=(s)=>`${Math.floor(s/3600)}:${pad(Math.floor(s%3600/60))}:${pad(s%60)}`;
const fmtM=(s)=>`${Math.floor(s/60)}:${pad(s%60)}`;

/* ---------------- status bar ---------------- */
function StatusBar(){
  return (
    <div className="relative h-[50px] shrink-0 flex items-end justify-between px-7 pb-1.5">
      <span className="text-[15px] font-semibold c">9:41</span>
      <div className="absolute left-1/2 -translate-x-1/2 top-[11px] w-[112px] h-[30px] rounded-full" style={{background:'#000'}}/>
      <div className="flex items-center gap-1.5 c">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity="0.35"/></svg>
        <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="1" y="1" width="20" height="10" rx="3" stroke="currentColor" strokeOpacity="0.5"/><rect x="2.5" y="2.5" width="15" height="7" rx="1.5" fill="currentColor"/><rect x="22" y="4" width="1.5" height="4" rx="0.75" fill="currentColor" fillOpacity="0.5"/></svg>
      </div>
    </div>
  );
}

/* ---------------- session header ---------------- */
function MetaChip({icon, children, onClick}){
  return (
    <button onClick={onClick} className="inline-flex items-center gap-1.5 h-[30px] px-2.5 rounded-[9px] text-[12.5px] font-semibold shrink-0"
      style={{background:T('inset'), color:T('text-secondary'), border:`1px solid ${T('border')}`}}>
      <span style={{color:T('text-muted')}}>{icon}</span>{children}
    </button>
  );
}
function SessionHeader({initRunning}){
  const [name,setName]=useState('Push Day A');
  const [sec,setSec]=useState(2529);
  const [run,setRun]=useState(initRunning);
  useEffect(()=>{ if(!run)return; const id=setInterval(()=>setSec(s=>s+1),1000); return ()=>clearInterval(id); },[run]);
  return (
    <div className="rounded-[16px] p-4 mb-3" style={{background:T('elevated'), border:`1px solid ${T('border')}`, boxShadow:'var(--sh-soft)'}}>
      <div className="flex items-center gap-2 mb-3">
        <input value={name} onChange={e=>setName(e.target.value)}
          className="flex-1 min-w-0 text-[18px] font-bold c" style={{letterSpacing:'-0.01em'}}/>
        <span style={{color:T('text-faint')}}><I.pencil s={14}/></span>
        <button className="ml-1 h-[30px] px-3 rounded-[9px] text-[12.5px] font-semibold" style={{color:T('destructive'), background:mix('destructive',10)}}>End</button>
      </div>
      {/* duration timer */}
      <div className="flex items-center justify-between rounded-[12px] px-3.5 py-2.5 mb-3" style={{background:T('inset')}}>
        <div className="flex items-center gap-2.5">
          {run
            ? <span className="w-2 h-2 rounded-full" style={{background:T('accent'), animation:'pulse 1.6s ease-in-out infinite'}}/>
            : <span className="w-2 h-2 rounded-full" style={{background:T('warning')}}/>}
          <div>
            <div className="text-[10px] font-bold tracking-[0.12em] uppercase" style={{color: run?T('text-muted'):T('warning')}}>{run?'Elapsed':'Paused'}</div>
            <div className="metric text-[28px]" style={{color: run?T('text-primary'):T('warning')}}>{fmtH(sec)}</div>
          </div>
        </div>
        <button onClick={()=>setRun(!run)} className="h-[40px] px-4 rounded-[11px] flex items-center gap-1.5 text-[13px] font-semibold"
          style={ run?{background:T('surface'), color:T('text-primary'), border:`1px solid ${T('border-strong')}`} : {background:T('accent'), color:T('on-accent')} }>
          {run? <><I.pause s={16}/>Pause</> : <><I.play s={15}/>Resume</>}
        </button>
      </div>
      {/* secondary fields */}
      <div className="flex flex-wrap gap-2 mb-3">
        <MetaChip icon={<I.cal s={14}/>}>Fri · May 30</MetaChip>
        <MetaChip icon={<I.weight s={14}/>}>82.5 kg</MetaChip>
      </div>
      <div className="flex flex-wrap gap-1.5 mb-3">
        <span className="text-[10px] font-bold tracking-[0.1em] uppercase self-center mr-0.5" style={{color:T('text-faint')}}>Equipment</span>
        {['Barbell','Dumbbell','Bodyweight'].map(e=>(
          <span key={e} className="px-2 py-[3px] rounded-[6px] text-[11px] font-semibold" style={{background:T('inset'), color:T('text-secondary'), border:`1px solid ${T('border')}`}}>{e}</span>
        ))}
      </div>
      <div className="flex items-center gap-1.5 pt-2.5" style={{borderTop:`1px solid ${T('border')}`}}>
        <I.plus s={14} style={{color:T('text-faint')}}/>
        <input placeholder="Add session note…" className="flex-1 text-[13px]" style={{color:T('text-secondary')}}/>
      </div>
    </div>
  );
}

/* ---------------- rest timer ---------------- */
function RestTimer({autorun}){
  const [total,setTotal]=useState(90);
  const [rem,setRem]=useState(autorun?78:90);
  const [mode,setMode]=useState(autorun?'running':'idle');
  useEffect(()=>{
    if(mode!=='running') return;
    const id=setInterval(()=> setRem(r=>{ if(r<=1){ clearInterval(id); setMode('done'); return 0;} return r-1; }),1000);
    return ()=>clearInterval(id);
  },[mode]);
  useEffect(()=>{ if(mode==='done'){ const t=setTimeout(()=>{ setMode('idle'); setRem(total); },1900); return ()=>clearTimeout(t);} },[mode,total]);
  const frac = Math.max(0, rem/total);

  if(mode==='done'){
    return (
      <div className="rounded-[12px] px-4 py-3 flex items-center justify-center gap-2" style={{background:mix('success',16), border:`1px solid ${mix('success',34,'border')}`, animation:'donepulse 420ms cubic-bezier(0.16,1,0.3,1)'}}>
        <span style={{color:T('success')}}><I.check s={18} sw={2.6}/></span>
        <span className="text-[14px] font-bold" style={{color:T('success')}}>Rest complete — go!</span>
      </div>
    );
  }
  if(mode==='running'){
    return (
      <div className="rounded-[12px] px-4 py-3" style={{background:T('inset'), border:`1px solid ${T('border')}`}}>
        <div className="flex items-center justify-between mb-2">
          <div className="flex items-baseline gap-2">
            <span className="text-[10px] font-bold tracking-[0.12em] uppercase" style={{color:T('text-muted')}}>Rest</span>
            <span className="metric text-[34px]" style={{color:T('accent')}}>{fmtM(rem)}</span>
          </div>
          <button onClick={()=>{setMode('idle'); setRem(total);}} className="h-[36px] px-3.5 rounded-[10px] flex items-center gap-1.5 text-[13px] font-semibold" style={{background:T('surface'), color:T('text-secondary'), border:`1px solid ${T('border-strong')}`}}>
            <I.skip s={15}/>Skip
          </button>
        </div>
        <div className="h-[4px] rounded-full overflow-hidden" style={{background:T('border')}}>
          <div className="h-full rounded-full" style={{width:`${frac*100}%`, background:T('accent'), transition:'width 1s linear'}}/>
        </div>
      </div>
    );
  }
  // idle
  const Step=({children,on})=>(<button onClick={on} className="w-9 h-9 rounded-[9px] flex items-center justify-center shrink-0" style={{background:T('surface'), color:T('text-secondary'), border:`1px solid ${T('border-strong')}`}}>{children}</button>);
  return (
    <div className="rounded-[12px] px-3 py-2.5 flex items-center justify-between" style={{background:T('inset'), border:`1px solid ${T('border')}`}}>
      <div className="flex items-center gap-2.5">
        <span style={{color:T('text-muted')}}><I.clock s={17}/></span>
        <span className="text-[13px] font-semibold" style={{color:T('text-secondary')}}>Rest</span>
        <span className="metric text-[20px] c">{fmtM(total)}</span>
      </div>
      <div className="flex items-center gap-1.5">
        <Step on={()=>{const v=Math.max(15,total-15); setTotal(v); setRem(v);}}><span className="text-[10px] font-bold mono">-15</span></Step>
        <Step on={()=>{const v=total+15; setTotal(v); setRem(v);}}><span className="text-[10px] font-bold mono">+15</span></Step>
        <button onClick={()=>{setRem(total); setMode('running');}} className="w-9 h-9 rounded-[9px] flex items-center justify-center" style={{background:T('accent'), color:T('on-accent')}}><I.play s={15}/></button>
      </div>
    </div>
  );
}

/* ---------------- set rows ---------------- */
function SetResult({kind, w, r, t, fresh}){
  const big={fontSize:'27px'}, sm={fontSize:'14px', color:T('text-muted')};
  return (
    <span className="metric flex items-baseline gap-1.5" style={{animation: fresh?'stamp 460ms cubic-bezier(0.16,1,0.3,1)':'none'}}>
      {kind==='wr' && <><span className="c" style={big}>{w}</span><span style={sm}>kg</span><span className="c" style={{fontSize:'19px', marginLeft:'2px'}}>× {r}</span></>}
      {kind==='time' && <><span className="c" style={big}>{t}</span><span style={sm}>min</span></>}
    </span>
  );
}
function SetRow({i, set, kind, onDel}){
  return (
    <div className="flex items-center gap-3 py-2.5">
      <div className="w-[24px] h-[24px] rounded-full flex items-center justify-center text-[12px] font-bold mono shrink-0"
        style={{background: set.warmup?'transparent':T('inset'), color: set.warmup?T('text-faint'):T('text-secondary'), border:`1px solid ${T('border')}`}}>{set.warmup?'W':i}</div>
      <div className="flex-1 min-w-0 flex items-center gap-2">
        {set.warmup && <span className="text-[10px] font-bold tracking-[0.08em] uppercase px-1.5 py-0.5 rounded" style={{color:T('text-faint'), background:T('inset')}}>Warmup</span>}
        <SetResult kind={kind} w={set.w} r={set.r} t={set.t} fresh={set.fresh}/>
        {set.pb && <span className="flex items-center gap-0.5 text-[10px] font-bold px-1.5 py-0.5 rounded-full" style={{background:T('accent'), color:T('on-accent')}}><I.award s={11}/>PB</span>}
        {set.rpe && <span className="text-[11.5px] font-semibold" style={{color:T('text-muted')}}>RPE {set.rpe}</span>}
      </div>
      <button onClick={onDel} className="w-7 h-7 rounded-full flex items-center justify-center shrink-0" style={{color:T('text-faint')}}><I.x s={15}/></button>
    </div>
  );
}

/* ---------------- log form ---------------- */
function FieldBox({label, prev, value, unit, onMinus, onPlus, wide}){
  const Step=({children,on})=>(<button onClick={on} className="w-9 h-9 rounded-[9px] flex items-center justify-center shrink-0" style={{background:T('surface'), color:T('text-secondary'), border:`1px solid ${T('border-strong')}`}}>{children}</button>);
  return (
    <div className={`${wide?'flex-1':'flex-1'} rounded-[12px] px-2.5 pt-2 pb-2.5`} style={{background:T('inset'), border:`1px solid ${T('border')}`}}>
      <div className="flex items-center justify-between mb-1.5 px-0.5">
        <span className="text-[10px] font-bold tracking-[0.08em] uppercase" style={{color:T('text-muted')}}>{label}</span>
        {prev && <span className="text-[10px] font-semibold mono" style={{color:T('text-faint')}}>prev {prev}</span>}
      </div>
      <div className="flex items-center justify-between gap-1.5">
        <Step on={onMinus}><I.minus s={16}/></Step>
        <div className="flex items-baseline gap-1">
          <span className="metric text-[26px] c">{value}</span>
          {unit && <span className="metric text-[12px]" style={{color:T('text-muted')}}>{unit}</span>}
        </div>
        <Step on={onPlus}><I.plus s={16}/></Step>
      </div>
    </div>
  );
}
function LogForm({kind, onLog}){
  const [w,setW]=useState(80);
  const [r,setR]=useState(8);
  const [t,setT]=useState(60); // seconds for time kind
  const [warm,setWarm]=useState(false);
  const [rpe,setRpe]=useState(null);
  const [showNote,setShowNote]=useState(false);
  const rpes=['Easy','Moderate','Hard','Max'];
  const log=()=>{
    if(kind==='wr') onLog({w, r, warmup:warm, rpe});
    else onLog({t:fmtM(t), warmup:warm, rpe});
    setWarm(false); setRpe(null); setShowNote(false);
  };
  return (
    <div className="rounded-[12px] p-3 mt-1" style={{background:T('surface'), border:`1px dashed ${T('border-strong')}`}}>
      <div className="flex items-center gap-2 mb-3">
        <span className="text-[10px] font-bold tracking-[0.1em] uppercase" style={{color:T('text-muted')}}>Log set {kind==='time'?'· duration':''}</span>
      </div>
      {/* metric inputs — layout adapts by kind */}
      <div className="flex gap-2 mb-3">
        {kind==='wr' && <>
          <FieldBox label="Weight" unit="kg" prev="80" value={w} onMinus={()=>setW(x=>Math.max(0,x-2.5))} onPlus={()=>setW(x=>x+2.5)}/>
          <FieldBox label="Reps" prev="8" value={r} onMinus={()=>setR(x=>Math.max(0,x-1))} onPlus={()=>setR(x=>x+1)}/>
        </>}
        {kind==='time' && <>
          <FieldBox label="Duration" unit="min:sec" prev="0:45" value={fmtM(t)} onMinus={()=>setT(x=>Math.max(0,x-5))} onPlus={()=>setT(x=>x+5)} wide/>
        </>}
      </div>
      {/* warmup */}
      <button onClick={()=>setWarm(!warm)} className="flex items-center gap-2 mb-3 w-full">
        <span className="w-[44px] h-[26px] rounded-full relative shrink-0" style={{background: warm?T('accent'):T('border-strong')}}>
          <span className="absolute top-[2px] w-[22px] h-[22px] rounded-full bg-white" style={{left: warm?'20px':'2px', transition:'left 200ms cubic-bezier(0.32,0.72,0,1)'}}/>
        </span>
        <span className="text-[13px] font-semibold" style={{color: warm?T('text-primary'):T('text-secondary')}}>Warmup set</span>
      </button>
      {/* RPE */}
      <div className="mb-1.5">
        <div className="grid grid-cols-4 gap-1.5">
          {rpes.map(o=>(
            <button key={o} onClick={()=>setRpe(rpe===o?null:o)} className="h-[42px] rounded-[10px] text-[12px] font-semibold transition-all duration-150"
              style={rpe===o?{background:T('accent'), color:T('on-accent')}:{background:T('inset'), color:T('text-secondary'), border:`1px solid ${T('border')}`}}>{o}</button>
          ))}
        </div>
        <p className="text-[10.5px] mt-1.5 px-0.5" style={{color:T('text-faint')}}>Easy = reps left in the tank · Max = went to failure</p>
      </div>
      {/* note */}
      {showNote
        ? <input autoFocus placeholder="Set note…" className="w-full text-[13px] mt-2 mb-1 pb-1.5" style={{color:T('text-secondary'), borderBottom:`1px solid ${T('border')}`}}/>
        : <button onClick={()=>setShowNote(true)} className="flex items-center gap-1.5 text-[12px] font-semibold mt-2 mb-1" style={{color:T('text-faint')}}><I.plus s={13}/>Add note</button>}
      {/* log */}
      <button onClick={log} className="w-full h-[48px] rounded-[12px] mt-2 text-[15px] font-semibold flex items-center justify-center gap-2" style={{background:T('accent'), color:T('on-accent'), boxShadow:'var(--sh-cta)'}}>
        <I.check s={18}/> Log set
      </button>
    </div>
  );
}

/* ---------------- exercise card ---------------- */
function ExerciseCard({name, kindLabel, kind, initSets, expanded:exp0=true, autorest}){
  const [expanded,setExpanded]=useState(exp0);
  const [sets,setSets]=useState(initSets);
  const [restKey,setRestKey]=useState(autorest?1:0);
  const [menu,setMenu]=useState(false);
  const onLog=(payload)=>{
    setSets(s=>[...s.map(x=>({...x,fresh:false})), {...payload, fresh:true}]);
    setRestKey(k=>k+1); // hand off to rest timer
  };
  const working = sets.filter(s=>!s.warmup);
  let wn=0;
  return (
    <div className="rounded-[16px] mb-3 overflow-hidden" style={{background:T('elevated'), border:`1px solid ${T('border')}`, boxShadow:'var(--sh-soft)'}}>
      {/* header */}
      <div className="flex items-center gap-2.5 px-3 py-3">
        <span className="shrink-0 cursor-grab" style={{color:T('text-faint')}}><I.grip s={18}/></span>
        <button onClick={()=>setExpanded(!expanded)} className="flex-1 min-w-0 text-left">
          <div className="text-[16px] font-bold c truncate" style={{letterSpacing:'-0.01em'}}>{name}</div>
          <div className="text-[11.5px] font-semibold mt-0.5" style={{color:T('text-muted')}}>{kindLabel} · {working.length} sets</div>
        </button>
        <button onClick={()=>setExpanded(!expanded)} className="shrink-0" style={{color:T('text-faint'), transform:expanded?'rotate(0)':'rotate(-90deg)', transition:'transform 200ms'}}><I.chevD s={20}/></button>
        <div className="relative shrink-0">
          <button onClick={()=>setMenu(!menu)} className="w-8 h-8 rounded-full flex items-center justify-center" style={{color:T('text-secondary'), background: menu?T('inset'):'transparent'}}><I.dots s={18}/></button>
          {menu && (
            <div className="absolute right-0 top-9 z-20 w-[160px] rounded-[12px] py-1.5" style={{background:T('elevated'), border:`1px solid ${T('border')}`, boxShadow:'var(--sh-cta)'}}>
              {[['Replace…',T('text-primary')],['View exercise',T('text-primary')],['Remove',T('destructive')]].map(([l,col])=>(
                <button key={l} onClick={()=>setMenu(false)} className="w-full text-left px-3.5 py-2 text-[13.5px] font-medium" style={{color:col}}>{l}</button>
              ))}
            </div>
          )}
        </div>
      </div>

      {expanded && (
        <div className="px-3 pb-3">
          {/* sets */}
          <div className="rounded-[12px] px-3 py-1" style={{background:T('surface'), border:`1px solid ${T('border')}`}}>
            {sets.map((s,idx)=>{ if(!s.warmup) wn++; return (
              <div key={idx} style={idx?{borderTop:`1px solid ${T('border')}`}:{}}>
                <SetRow i={s.warmup?'':wn} set={s} kind={kind} onDel={()=>setSets(arr=>arr.filter((_,j)=>j!==idx))}/>
              </div>
            );})}
          </div>
          {/* rest timer — takes over after a set is logged */}
          <div className="mt-2.5">
            <RestTimer key={restKey} autorun={autorest && restKey>0}/>
          </div>
          {/* log form */}
          <LogForm kind={kind} onLog={onLog}/>
        </div>
      )}
    </div>
  );
}

/* ---------------- add exercise sheet ---------------- */
function AddSheet({onClose}){
  const results=[
    ['Incline Dumbbell Press','Chest',['Dumbbell']],
    ['Cable Fly','Chest',['Cable']],
    ['Overhead Press','Shoulders',['Barbell']],
    ['Triceps Pushdown','Triceps',['Cable']],
  ];
  return (
    <div className="absolute inset-0 z-40 flex flex-col justify-end">
      <div className="absolute inset-0" style={{background:'oklch(0.1 0 0 / 0.4)'}} onClick={onClose}/>
      <div className="relative rounded-t-[22px] pt-2.5 pb-6" style={{background:T('elevated'), boxShadow:'0 -10px 44px oklch(0 0 0 / 0.3)', animation:'sheetin 360ms cubic-bezier(0.32,0.72,0,1)', maxHeight:'78%'}}>
        <div className="w-9 h-[5px] rounded-full mx-auto mb-3" style={{background:T('border-strong')}}/>
        <div className="flex items-center justify-between px-4 pb-3">
          <span className="w-8"/>
          <span className="text-[15px] font-bold c">Add Exercise</span>
          <button onClick={onClose} className="w-8 h-8 rounded-full flex items-center justify-center" style={{background:T('inset'), color:T('text-secondary')}}><I.x s={16}/></button>
        </div>
        <div className="px-4 mb-2">
          <div className="flex items-center gap-2 h-[44px] px-3.5 rounded-[12px]" style={{background:T('inset'), border:`1px solid ${T('border')}`}}>
            <span style={{color:T('text-muted')}}><I.search s={18}/></span>
            <input autoFocus placeholder="Search exercises" className="flex-1 text-[14px] c"/>
          </div>
        </div>
        <div className="px-2 overflow-y-auto scroll" style={{maxHeight:'46vh'}}>
          {results.map(([nm,mu,eq],i)=>(
            <div key={nm} className="flex items-center gap-3 px-2 py-3" style={i?{borderTop:`1px solid ${T('border')}`}:{}}>
              <div className="flex-1 min-w-0">
                <div className="text-[14px] font-semibold c truncate">{nm}</div>
                <div className="flex items-center gap-1.5 mt-1">
                  <span className="text-[11.5px] font-medium" style={{color:T('text-muted')}}>{mu}</span>
                  {eq.map(e=><span key={e} className="text-[10px] font-semibold px-1.5 py-0.5 rounded" style={{background:T('inset'), color:T('text-secondary'), border:`1px solid ${T('border')}`}}>{e}</span>)}
                </div>
              </div>
              <button onClick={onClose} className="h-[34px] px-3.5 rounded-[10px] text-[13px] font-semibold flex items-center gap-1" style={{background:T('accent'), color:T('on-accent')}}><I.plus s={15}/>Add</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---------------- screen ---------------- */
function Screen({initRunning}){
  const [sheet,setSheet]=useState(false);
  return (
    <div className="h-full flex flex-col relative">
      <StatusBar/>
      <div className="scroll flex-1 overflow-y-auto px-4 pt-1 pb-8">
        <SessionHeader initRunning={initRunning}/>
        <ExerciseCard name="Barbell Bench Press" kindLabel="Weight × Reps" kind="wr" autorest
          initSets={[
            {warmup:true, w:45, r:10},
            {w:80, r:8, rpe:'Moderate'},
            {w:80, r:8, rpe:'Hard', pb:true},
          ]}/>
        <ExerciseCard name="Plank" kindLabel="Time" kind="time"
          initSets={[{t:'1:00', rpe:'Moderate'},{t:'1:00'}]}/>
        <ExerciseCard name="Pull-Up" kindLabel="Bodyweight Reps" kind="wr" expanded={false}
          initSets={[{r:10},{r:8}]}/>

        <button onClick={()=>setSheet(true)} className="w-full h-[50px] rounded-[14px] mt-1 mb-4 text-[15px] font-semibold flex items-center justify-center gap-2"
          style={{background:T('surface'), color:T('text-primary'), border:`1.5px solid ${T('border-strong')}`}}>
          <I.plus s={19}/> Add exercise
        </button>
        <div className="text-center">
          <button className="text-[13px] font-medium" style={{color:T('text-faint')}}>Delete session</button>
        </div>
      </div>
      {sheet && <AddSheet onClose={()=>setSheet(false)}/>}
    </div>
  );
}

function Phone({mode, accent, initRunning}){
  return (
    <div data-theme={mode} data-accent={accent}>
      <div className="text-[10px] font-semibold tracking-[0.16em] uppercase mb-3 text-center" style={{color:'oklch(0.5 0.007 75)'}}>{mode} · {initRunning?'running':'paused'}</div>
      <div className="rounded-[46px] p-[5px]" style={{background: mode==='dark'?'#2a2a28':'#dcd7ce', boxShadow:'0 30px 60px oklch(0.245 0.04 75 / 0.18)'}}>
        <div className="rounded-[41px] overflow-hidden" style={{width:390, height:844, background:T('bg')}}>
          <Screen initRunning={initRunning}/>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [accent,setAccent]=useState('volt');
  return (
    <div className="min-h-screen">
      <header className="max-w-[960px] mx-auto px-6 pt-8 pb-6 flex items-center justify-between">
        <div className="flex items-baseline gap-2.5">
          <span className="metric text-[19px]" style={{color:'oklch(0.245 0.006 75)'}}>L</span>
          <span className="text-[14px] font-bold tracking-[0.18em]" style={{color:'oklch(0.245 0.006 75)'}}>LEDGER</span>
          <span className="text-[12px] ml-1" style={{color:'oklch(0.5 0.007 75)'}}>Live Session</span>
        </div>
        <div className="inline-flex rounded-[6px] p-[3px]" style={{background:'oklch(0.98 0.006 80)', border:'1px solid oklch(0.86 0.009 80)'}}>
          {[['Volt','volt'],['Ember','ember']].map(([l,v])=>(
            <button key={v} onClick={()=>setAccent(v)} className="px-3 py-1.5 rounded-[4px] text-[12px] font-semibold"
              style={accent===v?{background:'oklch(0.245 0.006 75)', color:'oklch(0.96 0.008 85)'}:{color:'oklch(0.45 0.007 75)'}}>{l}</button>
          ))}
        </div>
      </header>
      <div className="flex flex-wrap gap-10 justify-center pb-20 px-6">
        <Phone mode="light" accent={accent} initRunning={true}/>
        <Phone mode="dark" accent={accent} initRunning={false}/>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
